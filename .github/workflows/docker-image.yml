name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag containers-example:$(date +%s)
      
      - uses: actions/checkout@v4
      - name: Run the Docker image
        run: docker run containers-example:$(date +%s)
